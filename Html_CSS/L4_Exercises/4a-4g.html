<!--with hover,active, and transition: L4 Exercises-->

<style>
    .subscribe {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        vertical-align: top;

        transition: opacity 0.15s;
    }
    .subscribe:hover {
        opacity: 0.6;
    }
    .subscribe:active{
        opacity: 0.4;
    }


    .join {
        background-color: white;
        color: rgb(6, 95, 212);
        border-color: rgb(6, 95, 212);
        border-style: solid;
        border-width: 1px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right: 16px;
        vertical-align: top;

        transition: background-color 0.15s, color 0.15s;
    }
    .join:hover {
        background-color: rgb(6, 95, 212);
        color: white;
    }
    .join:active {
        opacity: 0.6;
    }

    .Tweet{
        background-color: rgb(9, 155, 240);
        color: white;
        border: none;
        height: 35px;
        width: 70px;
        border-radius: 35px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: box-shadow 0.15s;
        vertical-align: top;
    }
    .Tweet:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }

</style>

<button class="subscribe">SUBSCRIBE</button>
<button class="join">JOIN</button>
<button class="Tweet">Tweet</button>
