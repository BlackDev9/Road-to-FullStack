<!--with hover,active, and transition-->

<style>
    .subscribe {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        height: 35px;
        width: 110px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;

        transition: opacity 0.15s;
    }
    .subscribe:hover {
        opacity: 0.6;
    }
    .subscribe:active{
        opacity: 0.4;
    }


    .join {
        background-color: white;
        color: rgb(51, 51, 207);
        border-color: rgb(51, 51, 207);
        border-style: solid;
        border-width: 1px;
        height: 35px;
        width: 63px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;

        transition: background-color 0.15s, color 0.15s;
    }
    .join:hover {
        background-color: rgb(51, 51, 207);
        color: white;
    }
    .join:active {
        opacity: 0.6;
    }

    .Tweet{
        background-color: rgb(82, 82, 231);
        color: white;
        border: none;
        height: 35px;
        width: 70px;
        border-radius: 35px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: box-shadow 0.15s;
    }
    .Tweet:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }

</style>

<button class="subscribe">SUBSCRIBE</button>
<button class="join">JOIN</button>
<button class="Tweet">Tweet</button>
